<head>

    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --spotify-green: #1db954;
            --youtube-red: #ff0000;
            --accent-blue: #38bdf8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 2rem 1rem;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            background: linear-gradient(to right, #38bdf8, #3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        /* Quick Navigation Grid */
        .nav-section {
            background-color: var(--card-bg);
            padding: 1.5rem;
            border-radius: 12px;
            margin-bottom: 3rem;
            border: 1px solid #334155;
        }

        .nav-section h2 {
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--accent-blue);
            margin-bottom: 1rem;
        }

        .nav-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
            gap: 0.5rem;
        }

        .nav-link {
            background-color: #0f172a;
            color: var(--text-main);
            text-decoration: none;
            padding: 0.5rem;
            border-radius: 6px;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.2s ease;
            border: 1px solid #334155;
        }

        .nav-link:hover {
            background-color: var(--accent-blue);
            color: #0f172a;
            transform: translateY(-2px);
        }

        /* Teams Content Grid */
        .teams-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 2rem;
        }

        .team-card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 1.5rem;
            border: 1px solid #334155;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            scroll-margin-top: 20px;
        }

        .team-header {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1.25rem;
            border-bottom: 2px solid #334155;
            padding-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .top-btn {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-decoration: none;
        }

        .top-btn:hover {
            color: var(--accent-blue);
        }

        .song-category {
            margin-bottom: 1rem;
        }

        .category-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-weight: 700;
            color: var(--accent-blue);
            margin-bottom: 0.25rem;
        }

        .song-name {
            font-size: 0.95rem;
            font-weight: 600;
            margin-bottom: 0.4rem;
        }

        .action-links {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.25rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.35rem 0.7rem;
            border-radius: 6px;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: 600;
            color: #fff;
            transition: opacity 0.2s;
        }

        .btn:hover {
            opacity: 0.85;
        }

        .btn-spotify { background-color: var(--spotify-green); }
        .btn-youtube { background-color: var(--youtube-red); }

        footer {
            text-align: center;
            margin-top: 5rem;
            color: var(--text-muted);
            font-size: 0.9rem;
        }

        @media (max-width: 640px) {
            header h1 { font-size: 2rem; }
            .teams-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
